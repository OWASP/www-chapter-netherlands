  - type            : talk
    title           : False Clear Ahead - When Agents Derail Your Defenses
    start           : "19:15"
    end             : "20:00"
    abstract        : >-
                      AI agents that pass an initial security review can still derail through prompt 
                      injection, tool poisoning, or destructive overalignment — the "false clear." 
                      Drawing on recent research, real-world incidents, and AI governance at Dutch 
                      Railways, this talk explores how agentic AI reshapes the enterprise attack 
                      surface and what defense-in-depth strategies help you govern agents without 
                      blocking innovation.
    speakers        :
    - name            : Rens van Dongen
      picture         : rens_van_dongen.jpg
      bio             : >-
                        AI Governance and Cybersecurity strategist, specializing in responsible AI 
                        and secure software policy for the Dutch Railways. Experienced CISO in Retail 
                        Banking, Media Broadcasting and Enterprise Software industries. Balancing 
                        engineering background with a pragmatic, people-centric approach. Credentials 
                        include AIGP, CISSP, CISM, CCSP, CIPP/e, and Lead Implementer ISO/IEC 42001:2023 
                        (AIMS).
