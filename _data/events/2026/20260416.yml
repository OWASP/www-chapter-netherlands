  - type            : talk
    title           : Bot vs. Bash&#59; How Modern Threat Actors are Actually Using AI
    start           : "20:15"
    end             : "21:00"
    abstract        : >-
                      Generative AI has rapidly shifted to become a defining element of the modern 
                      threat landscape. This has resulted in great interest from a cybersecurity 
                      perspective and numerous discussions about its potential impacts. However, moving 
                      beyond speculation, this session presents real-world observations from the front 
                      lines of threat intelligence to demonstrate exactly how adversaries are utilizing 
                      these tools today.<br />
                      <br />
                      We will explore how state-sponsored APTs and financially motivated actors integrate 
                      Large Language Models (LLMs) to sharpen the quality of social engineering, 
                      reconnaissance, and code generation. Rather than focusing on "super-malware" 
                      theories, we dive into specific "in the wild" use cases to provide defenders with 
                      the practical context needed to identify and counter AI-augmented threats within 
                      their own environments.
    speakers        : 
    - name            : Daniel Kapellmann Zafra
      picture         : daniel_zafra.jpg
      bio             : >-
                        Daniel Kapellmann Zafra is Technology Strategy Lead in Google Threat Intelligence,
                        where he designs the future of large-scale investigative frameworks. With a 
                        specialized background in Information Operations (IO) and Cyber-Physical threats, 
                        Daniel has spent his career working with different threat intelligence teams to 
                        scale the breadth and depth of intelligence investigations. He currently spearheads 
                        initiatives at the intersection of AI and threat intelligence, focusing on how 
                        emerging AI ecosystems redefine both the threat landscape and the efficiency of 
                        modern cybersecurity. A former Fulbright Scholar and University of Washington 
                        Informatics alumnus, Daniel was previously recognized by the Kaspersky Academy 
                        Talent Lab for innovation in security architecture.
